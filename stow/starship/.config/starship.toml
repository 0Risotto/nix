add_newline = false
format = """
$cmd_duration у°ңҘ $directory $git_branch
$character"""

[character]
error_symbol = "[  пҖҚ пҒӢ](bold fg:red)"
success_symbol = "[  о©ұ пҒӢ](bold fg:blue)"

[cmd_duration]
format = "[оӮ¶](bold fg:yellow)[у°Әў $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow)"
min_time = 0

[directory]
format = "[оӮ¶](bold fg:green)[у°үӢ вҶ’$path]($style)[оӮҙ](bold fg:green)"
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:green fg:black"
truncation_length = 6
truncation_symbol = " вҖўвҖў/"

[directory.substitutions]
Desktop = " п’© "
Documents = " п’Ҙ "
Downloads = " пҗү "
GitHub = " у°ҠӨ "
Music = " у°ҺҲ "
Pictures = " пҗҸ "
Videos = " п”¬ "

[git_branch]
format = "у°ңҘ [оӮ¶](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black bg:cyan)[оӮҙ ](bold fg:cyan)"
style = "bg: cyan"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
cherry_pick = "[рҹҚ’ PICKING](bold red)"
format = "[($state( $progress_current of $progress_total))]($style) "

[git_status]
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
conflicted = " рҹҸі "
deleted = " рҹ—‘ "
diverged = " рҹҳө "
modified = " рҹ“қ "
renamed = " вңҚпёҸ "
staged = "[++($count)](green)"
stashed = " рҹ“Ұ "
untracked = " рҹӨ· вҖҚ"

[hostname]
disabled = false
format = "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan)"
ssh_only = false
trim_at = ".companyname.com"

[line_break]
disabled = false

[memory_usage]
disabled = true
style = "bold dimmed green"
symbol = " "
threshold = -1

[package]
disabled = true

[time]
disabled = true
format = "рҹ•ҷ[[ $time ]]($style) "
time_format = "%T"

[username]
disabled = false
format = "[оӮ¶](bold fg:cyan)[$user]($style)"
show_always = true
style_root = "red bold"
style_user = "bold bg:cyan fg:black"
